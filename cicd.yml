name: Java Maven CI/CD with Kubernetes

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-down-on: ubuntu-latest
    steps:
    # Step 1: Download your source code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Java environment and run Maven
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests # -DskipTests if you don't want headless Selenium executing here

    # Step 3: Build the Docker Image
    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build and Push Docker Image
      run: |
        docker build -t your-docker-username/maven-app:latest .
        docker push your-docker-username/maven-app:latest

    # Step 4: Deploy to Kubernetes
    - name: Set Kubernetes Context
      uses: azure/k8s-set-context@v3
      with:
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Deploy to Kubernetes Cluster
      run: kubectl rollout restart deployment/my-maven-app-deployment
