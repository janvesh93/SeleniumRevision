name: Cloud Docker Compilation Pipeline

on:
  push:
    branches: [ "main", "master" ]  # Triggers on both main and master branch commits

jobs:
  run-tests-in-cloud:
    runs-on: ubuntu-latest
    steps:
    # 1. Download your Java project files from GitHub
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Boot up a cloud Java instance
    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Compile the fat-JAR using the assembly plugin you added to pom.xml
    - name: Build Fat JAR with Maven
      run: mvn clean package -DskipTests

    # 4. Authenticate the container system with Docker Hub securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Build the Dockerfile image and push it to Docker Hub in lowercase format
    - name: Build and Push Docker Container Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Hardcoding the lowercase name directly is the safest way to avoid formatting errors
        tags: janvesh93/selenium-revision:latest
