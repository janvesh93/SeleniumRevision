name: Cloud Docker Compilation Pipeline

on:
  push:
    branches: [ "main", "master" ]  # Triggers on both main and master branch commits

jobs:
  run-tests-in-cloud:
    runs-on: ubuntu-latest
    steps:
    # 1. Download your Java project files from GitHub
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Authenticate the container system with Docker Hub securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build the Dockerfile image and push it to Docker Hub
    - name: Build and Push Docker Container Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Targets your personal Docker Hub account registry path
        tags: janvesh93/selenium-revision:latest
